name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build & Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        id: build
        run: mvn clean verify -B -ntp

      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: >-
          always()
          && (steps.build.outcome == 'success' || steps.build.outcome == 'failure')
          && github.event_name != 'pull_request'
             || github.event.pull_request.head.repo.full_name == github.repository
        with:
          name: Test Results (JDK ${{ matrix.java }})
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          only-summary: 'true'
          list-tests: 'failed'

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/'
          retention-days: 7

  coverage:
    name: Coverage (JaCoCo)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test with coverage
        run: mvn -B -ntp -P coverage clean verify

      - name: Upload JaCoCo HTML reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            open-agent-auth-core/target/site/jacoco/
            open-agent-auth-framework/target/site/jacoco/
          retention-days: 14

      - name: Generate JaCoCo coverage summary
        id: jacoco-summary
        run: |
          set -euo pipefail
          summarize() {
            local module="$1" xml="$2"
            python3 - "$module" "$xml" <<'PY'
          import sys, xml.etree.ElementTree as ET
          mod, xml = sys.argv[1], sys.argv[2]
          root = ET.parse(xml).getroot()
          totals = {c.get("type"): c for c in root.findall("counter")}
          def pct(t):
            c = totals.get(t)
            if c is None: return "n/a"
            missed, covered = int(c.get("missed")), int(c.get("covered"))
            denom = missed + covered
            return "n/a" if denom == 0 else f"{covered*100/denom:.1f}%"
          print(f"| {mod} | {pct('LINE')} | {pct('BRANCH')} | {pct('INSTRUCTION')} |")
          PY
          }
          {
            echo "## Coverage (JaCoCo ${{ github.sha }})"
            echo
            echo "| Module | Lines | Branches | Instructions |"
            echo "| --- | --- | --- | --- |"
            summarize "open-agent-auth-core" open-agent-auth-core/target/site/jacoco/jacoco.xml
            summarize "open-agent-auth-framework" open-agent-auth-framework/target/site/jacoco/jacoco.xml
          } | tee "$GITHUB_STEP_SUMMARY"

